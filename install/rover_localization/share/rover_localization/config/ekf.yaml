ekf_filter_node:
  ros__parameters:
    qos_overrides./odom.publisher.reliability: reliable
    qos_overrides./accel.publisher.reliability: reliable

    frequency: 30.0
    sensor_timeout: 0.1
    use_sim_time: true  # CHANGED: You're using Gazebo

    two_d_mode: true  # CRITICAL FIX: Enable 2D mode

    transform_time_offset: 0.0
    transform_timeout: 0.0

    print_diagnostics: true
    debug: false

    permit_corrected_publication: false
    publish_acceleration: true
    publish_tf: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # CHANGED: Use wheel odometry instead of RGBD odometry
    odom0: wheel_odom
    odom0_config: [
        # position - only X and Y, no Z
        true,   # x
        true,   # y
        false,  # z - DISABLED for 2D

        # orientation - only yaw, no roll/pitch
        false,  # roll - DISABLED for 2D
        false,  # pitch - DISABLED for 2D
        true,   # yaw

        # linear velocity - only X and Y
        true,   # vx
        true,   # vy
        false,  # vz - DISABLED for 2D

        # angular velocity - only yaw rate
        false,  # vroll - DISABLED for 2D
        false,  # vpitch - DISABLED for 2D
        true,   # vyaw

        # linear acceleration - all disabled
        false,  # ax
        false,  # ay
        false,  # az
      ]
    odom0_differential: false
    odom0_relative: false

    # IMU configuration for 2D navigation
    imu0: imu
    imu0_config: [
        # position - all disabled
        false,  # x
        false,  # y
        false,  # z

        # orientation - only yaw (compass heading)
        false,  # roll - DISABLED for 2D
        false,  # pitch - DISABLED for 2D
        true,   # yaw - helps with orientation drift

        # linear velocity - all disabled (IMU doesn't provide this reliably)
        false,  # vx
        false,  # vy
        false,  # vz

        # angular velocity - only yaw rate
        false,  # vroll - DISABLED for 2D
        false,  # vpitch - DISABLED for 2D
        true,   # vyaw - helps track turning

        # linear acceleration - all disabled
        false,  # ax
        false,  # ay
        false,  # az
      ]
    imu0_differential: false
    imu0_relative: true
    imu0_remove_gravitational_acceleration: true  # CHANGED: Remove gravity

    process_noise_covariance:
