local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 3.0           # ⚡ Throttled down from 5.0 to save high CPU cycles
      publish_frequency: 2.0
      global_frame: "odom"
      robot_base_frame: "base_link"
      use_sim_time: true
      transform_tolerance: 2.0        # ⚡ Widened response window drastically to allow for 15% RTF lag
      rolling_window: true
      track_unknown_space: true
      width: 5
      height: 5
      resolution: 0.05
      footprint: "[[0.3, 0.3], [0.3, -0.3], [-0.3, -0.3], [-0.3, 0.3]]"
      plugins: ["voxel_layer", "inflation_layer"]
      always_send_full_costmap: true

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 4.0      
        inflation_radius: 0.45
        
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: true
        footprint_clearing_enabled: true
        max_obstacle_height: 2.0
        publish_voxel_map: true
        origin_z: -0.5
        z_resolution: 0.2
        z_voxels: 10
        unknown_threshold: 15
        mark_threshold: 0
        observation_sources: "laser_scan rgbd_camera"
        
        laser_scan:
          topic: "/scan"
          data_type: "LaserScan"
          sensor_frame: "laser_link"    # ⚡ FIXED: Must be the clean frame name!
          max_obstacle_height: 2.0
          min_obstacle_height: -0.1
          obstacle_max_range: 3.0
          obstacle_min_range: 0.1
          raytrace_max_range: 3.5
          raytrace_min_range: 0.0
          clearing: true              
          marking: true
          observation_persistence: 0.0
          expected_update_rate: 0.0   # ⚡ Instructs Nav2 not to panic or drop packets when simulation lags

        rgbd_camera:
          topic: "/camera/points"
          data_type: "PointCloud2"
          sensor_frame: "camera_frame" # Ensure this matches your camera's actual TF frame too!
          max_obstacle_height: 2.0
          min_obstacle_height: -0.5
          obstacle_max_range: 2.5
          obstacle_min_range: 0.3    
          raytrace_max_range: 2.5
          raytrace_min_range: 0.3
          clearing: false             
          marking: true               
          observation_persistence: 0.0  
          expected_update_rate: 0.0   # ⚡ Helps prevent pointcloud drops on CPU spikes

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: "map"
      robot_base_frame: "base_link"
      use_sim_time: true
      transform_tolerance: 2.0        # ⚡ Widened response window here as well
      footprint: "[[0.3, 0.3], [0.3, -0.3], [-0.3, -0.3], [-0.3, 0.3]]"
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "inflation_layer"]
      always_send_full_costmap: true

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: false  
        topic: "/map"
        subscribe_to_updates: true

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.5