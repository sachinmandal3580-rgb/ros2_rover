local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: "odom"
      robot_base_frame: "base_link"
      use_sim_time: true
      transform_tolerance: 0.1        # Tight response window
      rolling_window: true
      track_unknown_space: true
      width: 5
      height: 5
      resolution: 0.05
      footprint: "[[0.3, 0.3], [0.3, -0.3], [-0.3, -0.3], [-0.3, 0.3]]"
      plugins: ["voxel_layer", "inflation_layer"]
      always_send_full_costmap: true

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 4.0      # Increased slightly to make the robot stay further from obstacles
        inflation_radius: 0.45
        
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: true
        footprint_clearing_enabled: true
        max_obstacle_height: 2.0
        publish_voxel_map: true
        origin_z: -0.5
        z_resolution: 0.2
        z_voxels: 10
        unknown_threshold: 15
        mark_threshold: 0
        observation_sources: "laser_scan rgbd_camera"
        
        laser_scan:
          topic: "/scan"
          data_type: "LaserScan"
          sensor_frame: "rover/base_link/lidar"
          max_obstacle_height: 2.0
          min_obstacle_height: -0.1
          obstacle_max_range: 3.0
          obstacle_min_range: 0.1
          raytrace_max_range: 3.5
          raytrace_min_range: 0.0
          clearing: true              # Reliable flat sensor handles main clearing loops
          marking: true
          observation_persistence: 0.0

        rgbd_camera:
          topic: "/camera/points"
          data_type: "PointCloud2"
          max_obstacle_height: 2.0
          min_obstacle_height: -0.5
          obstacle_max_range: 2.5
          obstacle_min_range: 0.3    # Ignore reflections right against the rover chassis
          raytrace_max_range: 2.5
          raytrace_min_range: 0.3
          clearing: false             # <-- CRITICAL: Stops camera from blindly clearing laser readings
          marking: true               # Use it strictly to catch 3D objects/slopes
          observation_persistence: 0.0  

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: "map"
      robot_base_frame: "base_link"
      use_sim_time: true
      transform_tolerance: 0.1
      footprint: "[[0.3, 0.3], [0.3, -0.3], [-0.3, -0.3], [-0.3, 0.3]]"
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "inflation_layer"]
      always_send_full_costmap: true

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: false  # Listens to live dynamic mapping stream
        topic: "/map"
        subscribe_to_updates: true

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.5