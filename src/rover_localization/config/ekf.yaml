ekf_filter_node:
  ros__parameters:
    qos_overrides./odom.publisher.reliability: reliable
    qos_overrides./accel.publisher.reliability: reliable

    frequency: 20.0
    sensor_timeout: 0.1
    use_sim_time: true

    two_d_mode: true

    # Tight timing offsets to maintain synchronization with Gazebo physics
    transform_time_offset: 0.0
    transform_timeout: 0.05            # Slightly increased from 0.0 to prevent tf cache drops

    print_diagnostics: true
    debug: false

    permit_corrected_publication: false
    publish_acceleration: false        # Turned off unless explicitly required by control nodes
    publish_tf: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    odom0: /odom_rgbd
    odom0_config: [
        false, false, false,
        false, false, false,
        true,  false, false,   # vx only
        false, false, false,
        false, false, false
      ]
    odom0_differential: false
    odom0_relative: false

    # IMU gives heading + angular rates
    imu0: /imu/data
    imu0_config: [
        false, false, false,
        false, false, true,    # yaw
        false, false, false,
        true,  true,  true,    # angular velocities
        false, false, false    # NO acceleration fusion
      ]
    imu0_differential: false
    imu0_relative: false
    imu0_remove_gravitational_acceleration: false  # not needed, ax/ay disabled # <-- CRITICAL: Keeps the IMU from introducing false forward acceleration when the rover pitches on rough terrain

    process_noise_covariance:
